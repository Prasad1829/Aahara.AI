<!DOCTYPE html>
<html>
<head>
    <title>{{ recipe.name }}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .recipe-image{
            width:400px;
            height:auto;
            display:block;
            margin:auto;
            border-radius:10px;
        }
    </style>

</head>
<body>

<div class="container mt-5">

    <!-- Back Button -->
    <a href="{% url 'dashboard' %}" class="btn btn-secondary mb-3">← Back</a>

    <div class="card shadow p-4">

        <!-- Recipe Image -->
        <img src="{{ recipe.image.url }}" class="recipe-image mb-3">

        <!-- Recipe Name -->
        <h2 class="text-center">{{ recipe.name }}</h2>

        <!-- Cooking Time -->
        <p><strong>Cooking Time:</strong> {{ recipe.cooking_time }} minutes</p>

        <!-- Ingredients -->
        <h4>Ingredients:</h4>
        <ul>
            {% for item in ingredients_list %}
                <li>{{ item }}</li>
            {% endfor %}
        </ul>

        <!-- Description -->
        <h4>Description:</h4>
        <ol>
            {% for step in description_steps %}
                <li>{{ step }}</li>
            {% endfor %}
        </ol>

    </div>

</div>

</body>
</html>
