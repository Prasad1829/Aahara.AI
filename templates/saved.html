{% extends "base.html" %}
{% block content %}
<div class="card glass pop">
    <h2>Saved Recipes</h2>
    {% if not rows %}
    <p class="muted">No saved recipes yet.</p>
    {% else %}
    <table class="table">
        <tr>
            <th>Recipe</th>
            <th>Saved at</th>
        </tr>
        {% for name, t in rows %}
        <tr>
            <td>{{ name }}</td>
            <td>{{ t }}</td>
        </tr>
        {% endfor %}
    </table>
    {% endif %}
</div>
{% endblock %}
