{% extends "base.html" %}

{% block title %}Sign Up - RecipeAI{% endblock %}

{% block content %}
<section class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <!-- Decorative background -->
    <div class="absolute inset-0 -z-10">
        <div class="absolute top-40 left-10 w-96 h-96 bg-purple-300 dark:bg-purple-900/20 rounded-full mix-blend-multiply dark:mix-blend-screen filter blur-3xl opacity-20 animate-float"></div>
        <div class="absolute bottom-40 right-10 w-96 h-96 bg-pink-300 dark:bg-pink-900/20 rounded-full mix-blend-multiply dark:mix-blend-screen filter blur-3xl opacity-20 animate-float" style="animation-delay: 2s;"></div>
    </div>

    <div class="w-full max-w-md animate-fade-in-up">
        <!-- Card -->
        <div class="card-3d backdrop-blur-md rounded-2xl p-8 sm:p-10">
            <!-- Header -->
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-gradient-to-br from-purple-500 to-pink-600 rounded-full flex items-center justify-center mx-auto mb-4 text-3xl shadow-lg shadow-purple-500/50">
                    <i class="fas fa-user-plus text-white"></i>
                </div>
                <h1 class="text-3xl font-bold mb-2">Create Account</h1>
                <p class="text-gray-600 dark:text-gray-400">Join thousands of food enthusiasts</p>
            </div>

            <!-- Form -->
            <form id="registerForm" class="space-y-4">
                <!-- Name -->
                <div>
                    <label class="block text-sm font-medium mb-2">Full Name</label>
                    <input type="text" id="name" name="name" required 
                        class="w-full px-4 py-3 bg-gray-100 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent transition-all"
                        placeholder="John Doe">
                </div>

                <!-- Email -->
                <div>
                    <label class="block text-sm font-medium mb-2">Email Address</label>
                    <input type="email" id="email" name="email" required 
                        class="w-full px-4 py-3 bg-gray-100 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent transition-all"
                        placeholder="you@example.com">
                </div>

                <!-- Password -->
                <div>
                    <label class="block text-sm font-medium mb-2">Password</label>
                    <input type="password" id="password" name="password" required 
                        class="w-full px-4 py-3 bg-gray-100 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent transition-all"
                        placeholder="â€¢â€¢â€¢â€¢â€¢â€¢â€¢â€¢">
                    <p class="text-xs text-gray-500 mt-1">Min. 8 characters with uppercase, numbers & symbols</p>
                </div>

                <!-- Confirm Password -->
                <div>
                    <label class="block text-sm font-medium mb-2">Confirm Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required 
                        class="w-full px-4 py-3 bg-gray-100 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent transition-all"
                        placeholder="â€¢â€¢â€¢â€¢â€¢â€¢â€¢â€¢">
                </div>

                <!-- Terms -->
                <div class="flex items-center">
                    <input type="checkbox" id="terms" name="terms" required
                        class="rounded border-gray-300 text-purple-500 shadow-sm focus:ring-purple-500 cursor-pointer">
                    <label for="terms" class="ml-2 text-sm text-gray-600 dark:text-gray-400 cursor-pointer">
                        I agree to the <a href="#" class="text-purple-500 hover:text-purple-600 font-semibold">Terms & Conditions</a>
                    </label>
                </div>

                <!-- Submit Button -->
                <button type="submit" 
                    class="w-full py-3 px-4 btn-primary text-white rounded-lg font-semibold hover:shadow-lg hover:shadow-purple-500/40 transition-all transform hover:scale-105"
                    style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
                    <i class="fas fa-check-circle mr-2"></i>Create Account
                </button>
            </form>

            <!-- Footer -->
            <p class="text-center mt-6 text-gray-600 dark:text-gray-400">
                Already have an account?
                <a href="/login" class="text-purple-500 hover:text-purple-600 font-semibold transition-colors">
                    Sign In
                </a>
            </p>
        </div>
    </div>
</section>

<script>
document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const name = document.getElementById('name').value;
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    
    if (password !== confirmPassword) {
        showToast('Passwords do not match', 'error');
        return;
    }
    
    if (password.length < 8) {
        showToast('Password must be at least 8 characters', 'error');
        return;
    }
    
    try {
        const response = await window.apiFetch('/api/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, email, password })
        });
        
        const data = await response.json();
        
        if (data.success) {
            showToast('Registration successful! Redirecting...', 'success');
            setTimeout(() => {
                window.location.href = '/login';
            }, 1000);
        } else {
            showToast(data.message || 'Registration failed', 'error');
        }
    } catch (error) {
        showToast('An error occurred', 'error');
        console.error('Error:', error);
    }
});
</script>
{% endblock %}
