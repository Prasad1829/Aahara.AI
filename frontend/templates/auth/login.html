{% extends "base.html" %}

{% block title %}Login - RecipeAI{% endblock %}

{% block content %}
<section class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <!-- Decorative background -->
    <div class="absolute inset-0 -z-10">
        <div class="absolute top-40 left-10 w-96 h-96 bg-blue-300 dark:bg-blue-900/20 rounded-full mix-blend-multiply dark:mix-blend-screen filter blur-3xl opacity-20 animate-float"></div>
        <div class="absolute bottom-40 right-10 w-96 h-96 bg-purple-300 dark:bg-purple-900/20 rounded-full mix-blend-multiply dark:mix-blend-screen filter blur-3xl opacity-20 animate-float" style="animation-delay: 2s;"></div>
    </div>

    <div class="w-full max-w-md animate-fade-in-up">
        <!-- Card -->
        <div class="card-3d backdrop-blur-md rounded-2xl p-8 sm:p-10">
            <!-- Header -->
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-gradient-to-br from-blue-500 to-purple-600 rounded-full flex items-center justify-center mx-auto mb-4 text-3xl shadow-lg shadow-blue-500/50">
                    <i class="fas fa-utensils text-white"></i>
                </div>
                <h1 class="text-3xl font-bold mb-2">Welcome Back</h1>
                <p class="text-gray-600 dark:text-gray-400">Sign in to access your recipes</p>
            </div>

            <!-- Form -->
            <form id="loginForm" class="space-y-4">
                <!-- Email -->
                <div>
                    <label class="block text-sm font-medium mb-2">Email Address</label>
                    <input type="email" id="email" name="email" required 
                        class="w-full px-4 py-3 bg-gray-100 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
                        placeholder="you@example.com">
                </div>

                <!-- Password -->
                <div>
                    <label class="block text-sm font-medium mb-2">Password</label>
                    <input type="password" id="password" name="password" required 
                        class="w-full px-4 py-3 bg-gray-100 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
                        placeholder="â€¢â€¢â€¢â€¢â€¢â€¢â€¢â€¢">
                </div>

                <!-- Remember me -->
                <div class="flex items-center">
                    <input type="checkbox" id="remember" name="remember" 
                        class="rounded border-gray-300 text-blue-500 shadow-sm focus:ring-blue-500 cursor-pointer">
                    <label for="remember" class="ml-2 text-sm text-gray-600 dark:text-gray-400 cursor-pointer">
                        Remember me
                    </label>
                </div>

                <!-- Submit Button -->
                <button type="submit" 
                    class="w-full py-3 px-4 btn-primary text-white rounded-lg font-semibold hover:shadow-lg hover:shadow-blue-500/40 transition-all transform hover:scale-105">
                    <i class="fas fa-sign-in-alt mr-2"></i>Sign In
                </button>
            </form>

            <!-- Footer -->
            <p class="text-center mt-6 text-gray-600 dark:text-gray-400">
                Don't have an account?
                <a href="/register" class="text-blue-500 hover:text-blue-600 font-semibold transition-colors">
                    Sign Up
                </a>
            </p>
        </div>
    </div>
</section>

<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const requestedNext = new URLSearchParams(window.location.search).get('next');
    
    try {
        const response = await window.apiFetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });
        
        const data = await response.json();
        
        if (data.success) {
            const role = String(data?.user?.role || 'user').toLowerCase();
            const nextPage = requestedNext || ((role === 'admin' || role === 'super_admin') ? '/admin' : '/dashboard');
            showToast('Login successful! Redirecting...', 'success');
            setTimeout(() => {
                window.location.href = nextPage;
            }, 1000);
        } else {
            showToast(data.message || 'Login failed', 'error');
        }
    } catch (error) {
        showToast('An error occurred', 'error');
        console.error('Error:', error);
    }
});
</script>
{% endblock %}
