{% extends "base.html" %}

{% block title %}Profile - RecipeAI{% endblock %}

{% block content %}
<section class="py-16 px-4 sm:px-6 lg:px-8">
    <div class="max-w-3xl mx-auto">
        <div class="card-3d rounded-2xl p-8">
            <div class="flex items-center justify-between mb-6">
                <h1 class="text-3xl font-bold text-gradient">My Profile</h1>
                <a href="/edit-profile" class="btn-secondary px-4 py-2 rounded-lg">Edit</a>
            </div>

            <div class="space-y-4 text-gray-700 dark:text-gray-300">
                <p><span class="font-semibold">Name:</span> <span id="profileName">Loading...</span></p>
                <p><span class="font-semibold">Email:</span> <span id="profileEmail">Loading...</span></p>
                <p><span class="font-semibold">Role:</span> <span id="profileRole">Loading...</span></p>
                <p><span class="font-semibold">Status:</span> <span id="profileStatus">Loading...</span></p>
                <p><span class="font-semibold">Member Since:</span> <span id="memberSince">Loading...</span></p>
            </div>
        </div>
    </div>
</section>

<script>
function formatDate(value) {
    if (!value) return '-';
    const dt = new Date(value);
    if (Number.isNaN(dt.getTime())) return String(value);
    return dt.toLocaleDateString();
}

async function loadProfile() {
    try {
        const response = await window.apiFetch('/api/auth/me');
        const data = await response.json();

        if (response.status === 401) {
            window.location.href = '/login?next=/profile';
            return;
        }
        if (!response.ok || !data.success || !data.user) {
            throw new Error(data.message || 'Could not load profile');
        }

        const user = data.user;
        document.getElementById('profileName').textContent = user.name || '-';
        document.getElementById('profileEmail').textContent = user.email || '-';
        document.getElementById('profileRole').textContent = user.role || '-';
        document.getElementById('profileStatus').textContent = user.status || '-';
        document.getElementById('memberSince').textContent = formatDate(user.created_at);
    } catch (error) {
        console.error('Profile load error:', error);
        if (window.showToast) window.showToast('Could not load profile', 'error');
    }
}

document.addEventListener('DOMContentLoaded', () => {
    loadProfile();
});
</script>
{% endblock %}
