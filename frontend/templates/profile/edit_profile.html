{% extends "base.html" %}

{% block title %}Edit Profile - RecipeAI{% endblock %}

{% block content %}
<section class="py-16 px-4 sm:px-6 lg:px-8">
    <div class="max-w-3xl mx-auto">
        <div class="card-3d rounded-2xl p-8">
            <h1 class="text-3xl font-bold mb-6 text-gradient">Edit Profile</h1>

            <form id="profileForm" class="space-y-5">
                <div>
                    <label for="name" class="block font-medium mb-2">Name</label>
                    <input id="name" name="name" type="text" class="w-full p-3 rounded-lg border border-gray-300 dark:border-gray-700 bg-white dark:bg-slate-900" required>
                </div>

                <div>
                    <label for="email" class="block font-medium mb-2">Email</label>
                    <input id="email" name="email" type="email" class="w-full p-3 rounded-lg border border-gray-300 dark:border-gray-700 bg-white dark:bg-slate-900" required>
                </div>

                <div class="flex gap-3">
                    <a href="/profile" class="btn-secondary px-5 py-2 rounded-lg">Cancel</a>
                    <button type="submit" class="btn-primary text-white px-5 py-2 rounded-lg">Save</button>
                </div>
            </form>
        </div>
    </div>
</section>

<script>
async function loadProfileForEdit() {
    try {
        const response = await window.apiFetch('/api/auth/me');
        const data = await response.json();
        if (response.status === 401) {
            window.location.href = '/login?next=/edit-profile';
            return;
        }
        if (!response.ok || !data.success || !data.user) {
            throw new Error(data.message || 'Could not load profile');
        }

        document.getElementById('name').value = data.user.name || '';
        document.getElementById('email').value = data.user.email || '';
    } catch (error) {
        console.error('Edit profile load error:', error);
        if (window.showToast) window.showToast('Could not load profile', 'error');
    }
}

async function submitProfileUpdate(event) {
    event.preventDefault();

    const submitButton = event.target.querySelector('button[type="submit"]');
    const originalText = submitButton.innerHTML;
    if (window.showLoading) window.showLoading(submitButton);

    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();

    try {
        const response = await window.apiFetch('/api/auth/profile', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, email }),
        });
        const data = await response.json();

        if (response.status === 401) {
            window.location.href = '/login?next=/edit-profile';
            return;
        }
        if (!response.ok || !data.success) {
            throw new Error(data.message || 'Could not update profile');
        }

        if (window.showToast) window.showToast('Profile updated successfully', 'success');
        setTimeout(() => {
            window.location.href = '/profile';
        }, 500);
    } catch (error) {
        if (window.showToast) window.showToast(error.message || 'Could not update profile', 'error');
    } finally {
        if (window.hideLoading) {
            window.hideLoading(submitButton, originalText);
        } else {
            submitButton.innerHTML = originalText;
            submitButton.disabled = false;
        }
    }
}

document.addEventListener('DOMContentLoaded', () => {
    const form = document.getElementById('profileForm');
    form.addEventListener('submit', submitProfileUpdate);
    loadProfileForEdit();
});
</script>
{% endblock %}
