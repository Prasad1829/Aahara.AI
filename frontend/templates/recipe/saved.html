{% extends "base.html" %}

{% block title %}Saved Recipes - RecipeAI{% endblock %}

{% block content %}
<section class="py-12 px-4 sm:px-6 lg:px-8 bg-gradient-to-b from-gray-50 to-white dark:from-slate-900 dark:to-slate-950">
    <div class="w-full">
        <div class="mb-12 animate-fade-in-up">
            <h1 class="text-4xl font-bold mb-2">Saved Recipes</h1>
            <p class="text-gray-600 dark:text-gray-400">Your favorite recipes collection</p>
        </div>

        <div id="savedRecipesGrid" class="recipe-grid">
            <div class="col-span-4 text-center py-12">
                <p class="text-gray-600 dark:text-gray-400">No saved recipes yet. Find and save your favorites!</p>
                <a href="/upload" class="mt-4 inline-block btn-primary px-6 py-3 rounded-lg">Find Recipes</a>
            </div>
        </div>
    </div>
</section>

<script>
function hasRecipeDetails(recipe) {
    return recipe && recipe.id !== null && recipe.id !== undefined && String(recipe.id).trim() !== '';
}

async function loadSavedRecipes() {
    try {
        const response = await window.apiFetch('/api/recipes/all');
        const data = await response.json();
        if (response.status === 401) {
            window.location.href = '/login?next=/saved';
            return;
        }

        if (data.success && data.recipes && data.recipes.length > 0) {
            const container = document.getElementById('savedRecipesGrid');
            container.innerHTML = data.recipes.slice(0, 8).map(recipe => `
                <a href="${hasRecipeDetails(recipe) ? `/recipe/${encodeURIComponent(recipe.id)}` : 'javascript:void(0)'}" class="recipe-card fade-in group cursor-pointer">
                    <div class="relative overflow-hidden h-40 bg-gradient-to-br from-green-400 to-blue-500">
                        <img src="${(window.getRecipeImageUrl && window.getRecipeImageUrl(recipe, { width: 640, height: 420 })) || '/static/images/recipe_placeholder_veg.svg'}" data-fallback-image="${(window.getFallbackRecipeImage && window.getFallbackRecipeImage(recipe)) || '/static/images/recipe_placeholder_veg.svg'}" alt="${recipe.name}" class="w-full h-full object-cover group-hover:scale-110 transition-transform" onerror="window.withRecipeImageFallback && window.withRecipeImageFallback(event)">
                        <div class="absolute inset-0 bg-black/0 group-hover:bg-black/20 transition-colors"></div>
                        ${hasRecipeDetails(recipe) ? `
                            <button class="absolute top-2 right-2 bg-red-500 text-white rounded-full p-2 opacity-0 group-hover:opacity-100 transition-opacity" onclick="unsaveRecipe(event, '${recipe.id}')">
                                <i class="fas fa-heart-broken"></i>
                            </button>
                        ` : ''}
                    </div>
                    <div class="p-3">
                        <h3 class="font-bold truncate text-sm">${recipe.name || ('Recipe ' + recipe.id)}</h3>
                        <p class="text-xs text-gray-600 dark:text-gray-400">${Array.isArray(recipe.ingredients) ? recipe.ingredients.length : 0} ingredients</p>
                    </div>
                </a>
            `).join('');
        }
    } catch (error) {
        console.error('Error loading saved recipes:', error);
    }
}

async function unsaveRecipe(e, recipeId) {
    e.preventDefault();
    try {
        const response = await window.apiFetch(`/api/recipes/${recipeId}/unsave`, {
            method: 'POST'
        });
        const data = await response.json();
        if (data.success) {
            showToast('Recipe removed from favorites', 'success');
            loadSavedRecipes();
        }
    } catch (error) {
        showToast('Error removing recipe', 'error');
    }
}

function showToast(message, type) {
    const toast = document.createElement('div');
    toast.className = `fixed bottom-4 right-4 px-6 py-3 rounded-lg ${type === 'success' ? 'bg-green-500' : 'bg-red-500'} text-white`;
    toast.textContent = message;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

document.addEventListener('DOMContentLoaded', loadSavedRecipes);
</script>
{% endblock %}
