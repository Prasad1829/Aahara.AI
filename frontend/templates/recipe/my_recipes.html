{% extends "base.html" %}

{% block title %}My Recipes - RecipeAI{% endblock %}

{% block content %}
<section class="py-12 px-4 sm:px-6 lg:px-8 bg-gradient-to-b from-gray-50 to-white dark:from-slate-900 dark:to-slate-950">
    <div class="max-w-[1280px] mx-auto">
        <div class="mb-12 animate-fade-in-up">
            <h1 class="text-4xl font-bold mb-2">My Recipes</h1>
            <p class="text-gray-600 dark:text-gray-400">All your saved and created recipes</p>
        </div>

        <div id="myRecipesGrid" class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="col-span-3 text-center py-12">
                <p class="text-gray-600 dark:text-gray-400">No recipes yet. Start by uploading an image!</p>
                <a href="/upload" class="mt-4 inline-block btn-primary px-6 py-3 rounded-lg">Upload Recipe</a>
            </div>
        </div>
    </div>
</section>

<script>
function countIngredients(recipe) {
    if (Array.isArray(recipe?.ingredients)) return recipe.ingredients.length;
    if (typeof recipe?.ingredients === 'string') {
        try {
            const parsed = JSON.parse(recipe.ingredients);
            if (Array.isArray(parsed)) return parsed.length;
        } catch (error) {}
        return recipe.ingredients.split(',').map(item => item.trim()).filter(Boolean).length;
    }
    return 0;
}

async function loadMyRecipes() {
    try {
        const response = await window.apiFetch('/api/recipes/all');
        const data = await response.json();
        if (response.status === 401) {
            window.location.href = '/login?next=/my-recipes';
            return;
        }
        
        if (data.success && data.recipes && data.recipes.length > 0) {
            const container = document.getElementById('myRecipesGrid');
            container.innerHTML = data.recipes.slice(0, 9).map(recipe => `
                <a href="${recipe.id !== null && recipe.id !== undefined && String(recipe.id).trim() !== '' ? `/recipe-details?id=${encodeURIComponent(recipe.id)}` : 'javascript:void(0)'}" class="card-3d rounded-xl overflow-hidden hover:shadow-lg transition-all transform hover:scale-105 group cursor-pointer">
                    <div class="relative overflow-hidden h-48 bg-gradient-to-br from-blue-400 to-purple-500">
                        <img src="${(window.getRecipeImageUrl && window.getRecipeImageUrl(recipe, { width: 640, height: 420 })) || '/static/images/recipe_placeholder_veg.svg'}" data-fallback-image="${(window.getFallbackRecipeImage && window.getFallbackRecipeImage(recipe)) || '/static/images/recipe_placeholder_veg.svg'}" alt="${recipe.name}" class="w-full h-full object-cover group-hover:scale-110 transition-transform" onerror="window.withRecipeImageFallback && window.withRecipeImageFallback(event)">
                        <div class="absolute inset-0 bg-black/0 group-hover:bg-black/20 transition-colors"></div>
                    </div>
                    <div class="p-4">
                        <h3 class="font-bold truncate">${recipe.name || ('Recipe ' + recipe.id)}</h3>
                        <p class="text-sm text-gray-600 dark:text-gray-400">${countIngredients(recipe)} ingredients</p>
                    </div>
                </a>
            `).join('');
        }
    } catch (error) {
        console.error('Error loading recipes:', error);
    }
}

document.addEventListener('DOMContentLoaded', loadMyRecipes);
</script>
{% endblock %}
